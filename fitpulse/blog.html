<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog — FitPulse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">FIT<span>PULSE</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="workout-plans.html">Workouts</a></li>
      <li><a href="nutrition.html">Nutrition</a></li>
      <li><a href="exercise-library.html">Exercises</a></li>
      <li><a href="challenges.html">Challenges</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
      <div class="nav-right" id="authSlot" style="gap:10px;"></div>
      <button class="nav-toggle" id="navToggle">☰</button>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="section-head">
      <div class="eyebrow">Blog</div>
      <h1 style="font-size:2.6rem;">Guides, science and stories</h1>
      <p>Written by our coaches and nutritionists.</p>
    </div>
    <div class="grid grid-3" id="blogGrid"></div>
  </div>
</section>

<script src="js/app.js"></script>
<script>
async function render(){
  try {
    const posts = await FP.apiCall('/blogs');
    document.getElementById('blogGrid').innerHTML = posts.map(p => `
      <div class="card">
        <span class="tag">${p.tag}</span>
        <h3>${p.title}</h3>
        <p>${p.excerpt}</p>
        <div class="small muted">${p.author} · ${p.date}</div>
      </div>`).join('');
  } catch (err) {
    console.error('Failed to render blog posts:', err);
  }
}
render();
</script>
</body>
</html>
