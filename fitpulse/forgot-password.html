<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password — FitPulse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">FIT<span>PULSE</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="workout-plans.html">Workouts</a></li>
      <li><a href="nutrition.html">Nutrition</a></li>
      <li><a href="exercise-library.html">Exercises</a></li>
      <li><a href="challenges.html">Challenges</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
      <div class="nav-right" id="authSlot" style="gap:10px;"></div>
      <button class="nav-toggle" id="navToggle">☰</button>
    </div>
  </div>
</nav>

<div class="auth-wrap">
  <div class="auth-card">
    <div class="eyebrow">Account recovery</div>
    <h2>Reset your password</h2>
    <p class="small">Enter the email linked to your account and we'll send a reset link (simulated in this demo).</p>
    <div class="form-msg" id="msg"></div>
    <form id="forgotForm">
      <div class="field">
        <label>Email address</label>
        <input type="email" name="email" required placeholder="you@example.com">
      </div>
      <button type="submit" class="btn btn-primary btn-block">Send Reset Link</button>
    </form>
    <p class="small center" style="margin-top:20px;"><a href="login.html" style="color:var(--accent);font-weight:600;">← Back to login</a></p>
  </div>
</div>

<script src="js/app.js"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const fd = new FormData(this);
  const msg = document.getElementById('msg');
  try {
    const res = await FP.apiCall('/auth/forgot-password', {
      method: 'POST',
      body: JSON.stringify({ email: fd.get('email').trim() })
    });
    FP.showMsg(msg, true, res.message || 'If the email exists, a password reset link has been sent.');
  } catch (err) {
    FP.showMsg(msg, false, err.message);
  }
});
</script>
</body>
</html>
