<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Community — FitPulse</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="index.html" class="logo">FIT<span>PULSE</span></a>
    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">Home</a></li>
      <li><a href="workout-plans.html">Workouts</a></li>
      <li><a href="nutrition.html">Nutrition</a></li>
      <li><a href="exercise-library.html">Exercises</a></li>
      <li><a href="challenges.html">Challenges</a></li>
      <li><a href="community.html">Community</a></li>
      <li><a href="blog.html">Blog</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme"></button>
      <div class="nav-right" id="authSlot" style="gap:10px;"></div>
      <button class="nav-toggle" id="navToggle">☰</button>
    </div>
  </div>
</nav>

<section class="section">
  <div class="container">
    <div class="section-head">
      <div class="eyebrow">Community</div>
      <h1 style="font-size:2.6rem;">Wins, questions and check-ins</h1>
      <p>Share your progress or ask the community for advice.</p>
    </div>

    <div class="card" style="margin-bottom:30px;">
      <form id="postForm">
        <div class="field">
          <textarea name="text" rows="3" placeholder="Share something with the community..." required></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Post</button>
      </form>
    </div>

    <div id="feed"></div>
  </div>
</section>

<script src="js/app.js"></script>
<script>
async function render(){
  try {
    const posts = await FP.apiCall('/community/posts');
    document.getElementById('feed').innerHTML = posts.map(p => `
      <div class="card" style="margin-bottom:16px;">
        <div style="display:flex;justify-content:space-between;">
          <b>${p.author}</b><span class="small muted">${p.time}</span>
        </div>
        <p style="margin-top:10px;">${p.text}</p>
        <button class="btn btn-ghost btn-sm like-btn" data-id="${p.id}">❤ ${p.likes}</button>
      </div>`).join('');

    document.querySelectorAll('.like-btn').forEach(b => {
      b.addEventListener('click', async () => {
        const id = parseInt(b.dataset.id);
        try {
          await FP.apiCall(`/community/posts/${id}/like`, { method: 'POST' });
          await render();
        } catch (err) {
          console.error('Failed to like post:', err);
          if (err.message.includes('Authentication required')) {
            location.href = 'login.html';
          }
        }
      });
    });
  } catch (err) {
    console.error('Failed to render community feed:', err);
  }
}

document.getElementById('postForm').addEventListener('submit', async function(e){
  e.preventDefault();
  const fd = new FormData(this);
  
  if (!FP.auth.currentUser()) {
    location.href = 'login.html';
    return;
  }

  try {
    await FP.apiCall('/community/posts', {
      method: 'POST',
      body: JSON.stringify({
        text: fd.get('text')
      })
    });
    this.reset();
    await render();
  } catch (err) {
    console.error('Failed to submit community post:', err);
  }
});

render();
</script>
</body>
</html>
